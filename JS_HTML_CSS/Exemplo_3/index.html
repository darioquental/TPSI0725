<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 3</title>
    <style>
    #caixa{
        width:100px;
        height:100px;
        background:blue;
        position:absolute;
        }
    </style>
</head>
<body>
<h1>isto é um titulo</h1>
<br>

<br>
<p>isto é um paragrafo</p>
<button onclick="animar()">animaçao</button>
<div id="caixa"></div>
<script>
    let paragrafo= document.createElement("h1");
    paragrafo.innerHTML="Nova frase";
    //document.body.appendChild(paragrafo);
    function animar(){
    let pos=0;
    const caix=document.getElementById("caixa");
    let animacao=setInterval(mover,10);

    function mover(){
    if(pos==530){
        clearInterval(animacao);
    }else{
        pos++;
        caix.style.right=pos+"px";
}
}
}

</script>
</body>
</html>
