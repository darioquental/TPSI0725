<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 2</title>
</head>
<body>
    <h1 id="Titulo">Exemplo 2</h1>
    <img src="" alt="" id="imagem">
    <p class="item">Texto</p>
    <button id="botao">Clique aqui para alerta</button>
    
    <script>
        const title=document.getElementById("Titulo");
        const Texto=document.getElementsByClassName("item");
        const css =document.querySelector(".item");
        const imag=document.getElementById("imagem");
        const botao=document.getElementById("botao");
        
        title.innerHTML="Novo Titulo";
        title.style.color="red";
        imag.src="./Img/logo-atec.png";
        botao.addEventListener("click",function(){
            title.innerHTML="Event Click";
        });
        botao.addEventListener("keydown",function(){
            alert("passou no botao");
        });

    </script>


</body>
</html>
